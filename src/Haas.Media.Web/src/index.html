<!doctype html>
<html lang="en" class="light">
<head>
  <meta charset="utf-8">
  <title>Haas Media Server</title>
  <meta name="description" content="A modern media server for downloading and managing content">
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <script>
    (function() {
      try {
        const stored = localStorage.getItem('theme');
        const theme = stored || 'system';
        const media = window.matchMedia('(prefers-color-scheme: dark)');
        const resolved = theme === 'system' ? (media.matches ? 'dark' : 'light') : theme;
        const root = document.documentElement;
        root.classList.remove('light', 'dark');
        root.classList.add(resolved);
        root.style.colorScheme = resolved;
      } catch (e) {
        document.documentElement.classList.add('light');
        document.documentElement.style.colorScheme = 'light';
      }
    })();
  </script>
  <script>
    // Runtime environment - fallback to localhost for development when running outside Aspire
    window.__ENV__ = {
      API_DOWNLOADER_URL: 'http://localhost:8080'
    };
  </script>
</head>
<body class="min-h-screen bg-white text-gray-900 antialiased transition-colors duration-0 dark:bg-gray-950 dark:text-gray-100">
  <app-root></app-root>
</body>
</html>
